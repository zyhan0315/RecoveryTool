<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>下一步</title>

<style>

body{
    background:#f7f9fc;
    font-family:Arial,sans-serif;
    padding:20px;
}

.card{
    max-width:500px;
    margin:auto;
    background:white;
    padding:25px;
    border-radius:20px;
    box-shadow:0 2px 12px rgba(0,0,0,0.08);
}

h2{
    text-align:center;
    margin-bottom:25px;
}

.option{
    width:100%;
    padding:16px;
    margin:10px 0;
    border:none;
    border-radius:12px;
    background:#eef2f7;
    cursor:pointer;
    font-size:16px;
}

.option:hover{
    background:#dfe8f1;
}

</style>
</head>

<body>

<div class="card">

<h2>
现在的你准备做什么？
</h2>

<form action="/saveAction" method="post">

<button class="option" type="submit"
name="actionTaken"
value="去做原本要做的事">
去做原本要做的事
</button>

<button class="option" type="submit"
name="actionTaken"
value="去散步">
去散步
</button>

<button class="option" type="submit"
name="actionTaken"
value="去洗澡">
去洗澡
</button>

<button class="option" type="submit"
name="actionTaken"
value="去收拾房间">
去收拾房间
</button>

<button class="option" type="submit"
name="actionTaken"
value="去学习/工作">
去学习/工作
</button>

<button class="option" type="submit"
name="actionTaken"
value="去找人聊天">
去找人聊天
</button>

<button class="option" type="submit"
name="actionTaken"
value="去休息">
去休息
</button>

<button class="option" type="submit"
name="actionTaken"
value="去吃东西">
去吃东西
</button>

<button class="option" type="submit"
name="actionTaken"
value="其他">
其他
</button>

</form>

</div>

</body>
</html>
