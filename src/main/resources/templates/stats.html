<!DOCTYPE html>
<html lang="zh-CN"
      xmlns:th="http://www.thymeleaf.org">

<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>我的模式</title>

<style>

body{
    background:#f7f9fc;
    font-family:Arial,sans-serif;
    padding:20px;
}

.container{
    max-width:700px;
    margin:auto;
}

.title{
    text-align:center;
    font-size:30px;
    margin-bottom:30px;
}

.card{
    background:white;
    border-radius:20px;
    padding:25px;
    margin-bottom:20px;
    box-shadow:0 2px 12px rgba(0,0,0,0.08);
}

.section-title{
    font-size:22px;
    margin-bottom:15px;
}

.row{
    display:flex;
    justify-content:space-between;
    padding:10px 0;
    border-bottom:1px solid #f0f0f0;
}

.count{
    font-weight:bold;
    color:#8dc6a3;
}

.empty{
    color:#888;
    text-align:center;
    padding:20px;
}

</style>
</head>

<body>

<div class="container">

    <div class="title">
        📊 我的模式
    </div>

    <!-- Trigger统计 -->

    <div class="card">

        <div class="section-title">
            最常见 Trigger
        </div>

        <div th:if="${#maps.isEmpty(triggerStats)}"
             class="empty">
            暂无数据
        </div>

        <div th:each="entry : ${triggerStats}"
             class="row">

            <span th:text="${entry.key}">
            </span>

            <span class="count"
                  th:text="${entry.value + ' 次'}">
            </span>

        </div>

    </div>

    <!-- Need统计 -->

    <div class="card">

        <div class="section-title">
            最常见 Need
        </div>

        <div th:if="${#maps.isEmpty(needStats)}"
             class="empty">
            暂无数据
        </div>

        <div th:each="entry : ${needStats}"
             class="row">

            <span th:text="${entry.key}">
            </span>

            <span class="count"
                  th:text="${entry.value + ' 次'}">
            </span>

        </div>

    </div>

</div>

</body>
</html>
