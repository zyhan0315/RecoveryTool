<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>给未来的我</title>

<style>

body{
    background:#f7f9fc;
    font-family:Arial,sans-serif;
    padding:20px;
}

.card{
    max-width:500px;
    margin:auto;
    background:white;
    padding:25px;
    border-radius:20px;
    box-shadow:0 2px 12px rgba(0,0,0,0.08);
}

textarea{
    width:100%;
    height:180px;
    padding:12px;
    border-radius:12px;
    border:1px solid #ddd;
    resize:none;
    box-sizing:border-box;
    font-size:16px;
}

.btn{
    width:100%;
    margin-top:20px;
    padding:15px;
    border:none;
    border-radius:12px;
    background:#8dc6a3;
    color:white;
    font-size:16px;
    cursor:pointer;
}

</style>
</head>

<body>

<div class="card">

<h2>
给未来的我留一句话
</h2>

<p>
今天你想告诉未来的自己什么？
</p>

<form action="/saveSummary" method="post">

    <textarea
        name="summaryText"
        placeholder="例如：原来最难受的是等待，不是吐司本身。">
    </textarea>

    <button class="btn" type="submit">
        保存
    </button>

</form>

</div>

</body>
</html>
