<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Recovery Tool</title>

<style>

body{
    background:#f7f9fc;
    font-family:Arial,sans-serif;
    padding:20px;
}

.container{
    max-width:500px;
    margin:auto;
}

.card{
    background:white;
    border-radius:20px;
    padding:30px;
    box-shadow:0 2px 12px rgba(0,0,0,0.08);
    text-align:center;
}

.title{
    font-size:28px;
    margin-bottom:10px;
}

.subtitle{
    color:#666;
    margin-bottom:30px;
}

.btn{
    width:100%;
    padding:18px;
    margin:12px 0;
    border:none;
    border-radius:14px;
    font-size:18px;
    cursor:pointer;
}

.red{
    background:#ffb3b3;
}

.green{
    background:#bfe3c0;
}

.blue{
    background:#d7e7f7;
}

.btn:hover{
    opacity:0.9;
}

</style>
</head>

<body>

<div class="container">

<div class="card">

<div class="title">
🌿 Recovery Tool
</div>

<div class="subtitle">
帮助自己看清发生了什么
</div>

<button class="btn red"
onclick="location.href='/red'">
🔴 我有冲动
</button>

<button class="btn green"
onclick="location.href='/history'">
📖 查看记录
</button>

<button class="btn blue"
onclick="location.href='/stats'">
📊 我的模式
</button>

</div>

</div>

</body>
</html>
